<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>CIM Tray Menu</title>
    <style>
      /* 系統匣客製選單：深色、緊湊，配色比照主 App */
      :root {
        --bg-elev: #252526;
        --border: #3a3a3a;
        --text: #e4e4e4;
        --text-dim: #9a9a9a;
        --hover: #37373a;
        --danger: #e0655b;
        --danger-hover: #4a2320;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        cursor: default;
        font-family: 'Segoe UI', 'Microsoft JhengHei', system-ui, sans-serif;
      }

      /* body padding 讓卡片陰影不被視窗邊緣裁切；數值需與 JS 的 SHADOW_PAD 一致 */
      body {
        padding: 10px;
      }

      .menu {
        display: inline-block;
        min-width: 168px;
        padding: 5px;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
      }

      .menu__item {
        display: flex;
        align-items: center;
        gap: 9px;
        height: 30px;
        padding: 0 10px;
        border-radius: 5px;
        color: var(--text);
        font-size: 13px;
        line-height: 1;
        white-space: nowrap;
      }

      .menu__item:hover {
        background: var(--hover);
      }

      .menu__item svg {
        flex: none;
        width: 16px;
        height: 16px;
        color: var(--text-dim);
      }

      .menu__item:hover svg {
        color: var(--text);
      }

      .menu__item--danger {
        color: var(--danger);
      }
      .menu__item--danger svg {
        color: var(--danger);
      }
      .menu__item--danger:hover {
        background: var(--danger-hover);
      }
      .menu__item--danger:hover svg {
        color: var(--danger);
      }

      .menu__sep {
        height: 1px;
        margin: 4px 6px;
        background: var(--border);
      }
    </style>
  </head>
  <body>
    <div class="menu" id="menu"></div>
    <script type="module">
      // 需與 CSS 的 body padding 一致，回報視窗尺寸時把陰影留白算進去
      const SHADOW_PAD = 10

      const ICONS = {
        open: '<rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>',
        gear: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
        power: '<path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/>'
      }

      const ITEMS = [
        { id: 'open', label: '開啟 CIM', icon: 'open' },
        { id: 'settings', label: '設定', icon: 'gear' },
        { sep: true },
        { id: 'quit', label: '停止 CIM', icon: 'power', danger: true }
      ]

      function svg(name) {
        return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]}</svg>`
      }

      const menu = document.getElementById('menu')
      for (const item of ITEMS) {
        if (item.sep) {
          const sep = document.createElement('div')
          sep.className = 'menu__sep'
          menu.appendChild(sep)
          continue
        }
        const el = document.createElement('div')
        el.className = 'menu__item' + (item.danger ? ' menu__item--danger' : '')
        el.innerHTML = svg(item.icon) + `<span>${item.label}</span>`
        el.addEventListener('click', () => window.api.trayAction(item.id))
        menu.appendChild(el)
      }

      // Esc 關閉選單
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') window.api.trayAction('close')
      })

      // 版面完成後回報實際尺寸給主行程，讓視窗貼合內容
      requestAnimationFrame(() => {
        const w = menu.offsetWidth + SHADOW_PAD * 2
        const h = menu.offsetHeight + SHADOW_PAD * 2
        window.api.reportMenuSize(w, h)
      })
    </script>
  </body>
</html>
